<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sanskrit Visual Builder v3.1</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- ═══ TOOLBAR ═══════════════════════════════════════════════════ -->
  <header id="toolbar">
    <div id="toolbar-left">
      <span id="logo">⟨ψ⟩ Sanskrit Visual Builder</span>
      <span id="version">v3.1</span>
    </div>
    <div id="toolbar-center">
      <button id="btn-run"   class="tb-btn primary" title="Run program (Ctrl+Enter)">▶ RUN</button>
      <button id="btn-stop"  class="tb-btn danger"  title="Stop execution">■ STOP</button>
      <button id="btn-clear" class="tb-btn"         title="Clear canvas">✕ CLEAR</button>
      <div class="tb-sep"></div>
      <button id="btn-open"  class="tb-btn" title="Open .sq file">📂 OPEN</button>
      <button id="btn-save"  class="tb-btn" title="Save as .sq file">💾 SAVE</button>
      <div class="tb-sep"></div>
      <button id="btn-code"  class="tb-btn toggle" title="Toggle code/canvas view">&lt;/&gt; CODE</button>
      <button id="btn-export" class="tb-btn" title="Export circuit">📤 EXPORT</button>
    </div>
    <div id="toolbar-right">
      <span id="status-indicator" class="status-ready">● Ready</span>
      <span id="engine-badge" class="badge-rust">Rust</span>
    </div>
  </header>

  <!-- ═══ MAIN LAYOUT ══════════════════════════════════════════════ -->
  <div id="main-layout">

    <!-- PALETTE (left) -->
    <aside id="palette">
      <div id="palette-search-wrap">
        <input id="palette-search" type="text" placeholder="🔍 Search blocks..." autocomplete="off">
        <button id="palette-clear-search" title="Clear search">✕</button>
      </div>
      <div id="palette-list"></div>
    </aside>

    <!-- CANVAS + CODE EDITOR (centre) -->
    <main id="workspace">
      <!-- Visual Canvas -->
      <div id="canvas-wrap">
        <svg id="canvas" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <marker id="arrowhead" markerWidth="10" markerHeight="7"
                    refX="9" refY="3.5" orient="auto">
              <polygon points="0 0, 10 3.5, 0 7" fill="#0F4C5C"/>
            </marker>
          </defs>
          <g id="canvas-grid"></g>
          <g id="canvas-wires"></g>
          <g id="canvas-blocks"></g>
          <!-- Wire being drawn -->
          <path id="wire-draft" class="wire-draft" d="" marker-end="url(#arrowhead)"/>
        </svg>
        <div id="canvas-empty-hint">
          <div class="hint-icon">⟨ψ⟩</div>
          <div class="hint-title">Drag blocks here to start</div>
          <div class="hint-sub">Or click CODE to write Sanskrit code directly</div>
        </div>
      </div>

      <!-- Code Editor -->
      <div id="code-wrap" class="hidden">
        <div id="code-toolbar">
          <span class="code-label">Sanskrit Code</span>
          <button id="btn-code-run" class="tb-btn primary small">▶ RUN</button>
          <button id="btn-code-clear" class="tb-btn small">CLEAR</button>
          <select id="example-selector">
            <option value="">Load example...</option>
            <option value="bell">Bell State (Hello World)</option>
            <option value="grover">Grover Search</option>
            <option value="vqe">VQE Hydrogen</option>
            <option value="teleport">Quantum Teleportation</option>
            <option value="qrng">Quantum Random Numbers</option>
            <option value="stats">Statistical Analysis</option>
            <option value="shor">Shor Factoring</option>
            <option value="qaoa">QAOA Portfolio</option>
          </select>
        </div>
        <textarea id="code-editor" spellcheck="false" autocomplete="off"
          placeholder="-- Sanskrit Visual Builder v3.1
-- Type your Sanskrit code here or load an example above

let q = qubits(2)
H(q[0])
CNOT(q[0], q[1])
let result = measure_all(q, shots=1000)
print(result.histogram)
"></textarea>
      </div>
    </main>

    <!-- PROPERTIES PANEL (right) -->
    <aside id="properties">
      <div id="properties-header">
        <span id="properties-title">Properties</span>
        <button id="properties-close" title="Close">✕</button>
      </div>
      <div id="properties-body">
        <div id="properties-empty">
          <div class="prop-empty-icon">☰</div>
          <div class="prop-empty-text">Click a block to configure it</div>
        </div>
        <div id="properties-form" class="hidden"></div>
      </div>
    </aside>
  </div>

  <!-- ═══ OUTPUT PANEL (bottom) ════════════════════════════════════ -->
  <div id="output-panel">
    <div id="output-header">
      <span id="output-title">Output</span>
      <div id="output-controls">
        <button id="btn-output-clear" title="Clear output">✕ Clear</button>
        <button id="btn-output-toggle" title="Collapse/expand">▼</button>
      </div>
    </div>
    <div id="output-body">
      <div id="output-lines"></div>
    </div>
  </div>

  <!-- ═══ EXPORT MODAL ════════════════════════════════════════════ -->
  <div id="export-modal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-header">
        <span>Export Circuit</span>
        <button class="modal-close" data-modal="export-modal">✕</button>
      </div>
      <div class="modal-body">
        <label>Format:
          <select id="export-format">
            <option value="qasm2">OpenQASM 2.0 (IBM, most simulators)</option>
            <option value="qasm3">OpenQASM 3.0 (next-gen IBM)</option>
            <option value="ibm">IBM JSON (cloud API)</option>
            <option value="ionq">IonQ JSON (trapped-ion)</option>
            <option value="cirq">Google Cirq Python</option>
            <option value="braket">Amazon Braket Python</option>
            <option value="quil">Rigetti Quil</option>
            <option value="qir">QIR (LLVM-based)</option>
            <option value="svg">SVG Circuit Diagram</option>
            <option value="json">Sanskrit Native JSON</option>
          </select>
        </label>
        <textarea id="export-output" readonly placeholder="Click Export to generate..."></textarea>
        <div class="modal-actions">
          <button id="btn-export-generate" class="tb-btn primary">Export</button>
          <button id="btn-export-copy" class="tb-btn">Copy</button>
          <button id="btn-export-download" class="tb-btn">Download</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Hidden file input for Open -->
  <input type="file" id="file-open-input" accept=".sq,.txt" class="hidden">

  <script type="module" src="/js/app.js"></script>
</body>
</html>
